name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/tp-cicd-api

jobs:

  test:
    name: Install & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Installation des dépendances
        run: npm ci

      - name: Exécution des tests
        run: npm run test:ci

  build-push:
    name: Build & Push image
    needs: test
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_sha: ${{ steps.vars.outputs.sha_short }}
    steps:
      - uses: actions/checkout@v4

      - name: Set short SHA
        id: vars
        run: echo "sha_short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: ./app
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-vm:
    name: Deploy to K3s VM
    needs: build-push
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copie des manifests vers la VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "k8s/"
          target: "/home/${{ secrets.EC2_USER }}/app/"
          timeout: 120s
          command_timeout: 10m

      - name: Déploiement K3s via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -euo pipefail
            export KUBECONFIG=/etc/rancher/k3s/k3s.yaml

            # GHCR exige des noms d'image en minuscules
            OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
            ACTOR_LC=$(echo "${{ github.actor }}" | tr '[:upper:]' '[:lower:]')
            IMAGE="ghcr.io/$OWNER_LC/tp-cicd-api:sha-${{ github.sha }}"

            MANIFESTS_DIR="/home/${{ secrets.EC2_USER }}/app/k8s"

            # Namespace
            kubectl apply -f "$MANIFESTS_DIR/namespace.yaml"

            # Secrets (idempotents)
            kubectl create secret generic app-secrets -n tp-cicd \
              --from-literal=MONGO_USER='${{ secrets.MONGO_USER }}' \
              --from-literal=MONGO_PASSWORD='${{ secrets.MONGO_PASSWORD }}' \
              --dry-run=client -o yaml | kubectl apply -f -

            kubectl create secret docker-registry ghcr-pull -n tp-cicd \
              --docker-server=ghcr.io \
              --docker-username="$ACTOR_LC" \
              --docker-password='${{ secrets.GHCR_PULL_TOKEN }}' \
              --dry-run=client -o yaml | kubectl apply -f -

            # Manifests (api-deployment patché à la volée pour injecter la bonne image dès le 1er apply)
            kubectl apply -f "$MANIFESTS_DIR/configmap.yaml"
            kubectl apply -f "$MANIFESTS_DIR/mongo-statefulset.yaml"
            kubectl apply -f "$MANIFESTS_DIR/mongo-service.yaml"
            sed "s|ghcr.io/OWNER/tp-cicd-api:latest|$IMAGE|g" "$MANIFESTS_DIR/api-deployment.yaml" \
              | kubectl apply -f -
            kubectl apply -f "$MANIFESTS_DIR/api-service.yaml"
            kubectl apply -f "$MANIFESTS_DIR/ingress.yaml"

            # Attache imagePullSecret + force l'image (au cas où l'apply n'aurait pas déclenché de rollout)
            kubectl -n tp-cicd patch deployment api \
              -p '{"spec":{"template":{"spec":{"imagePullSecrets":[{"name":"ghcr-pull"}]}}}}'
            kubectl -n tp-cicd set image deployment/api api=$IMAGE
            kubectl -n tp-cicd rollout status deployment/api --timeout=180s

            echo "Déploiement terminé. Image = $IMAGE"
            kubectl -n tp-cicd get pods -o wide
